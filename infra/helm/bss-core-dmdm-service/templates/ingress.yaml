{{- $ing := .Values.ingress | default dict -}}
{{- if and ($ing.enabled) ($ing.hosts) (gt (len $ing.hosts) 0) -}}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ing
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: "nginx"
    {{- with $ing.annotations }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  ingressClassName: "nginx"
  rules:
    {{- range $h := $ing.hosts }}
    - host: {{ $h.host | quote }}
      http:
        paths:
          {{- range $p := $h.paths }}
          - path: {{ $p.path | quote }}
            pathType: {{ $p.pathType | default "Prefix" }}
            backend:
              service:
                name: {{ $p.serviceName | default $.Release.Name }}
                port:
                  number: {{ $p.servicePort | default $.Values.service.servicePort }}
          {{- end }}
    {{- end }}
  {{- if $ing.tls }}
  tls:
    {{- toYaml $ing.tls | nindent 4 }}
  {{- end }}
{{- end }}
